<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f4f4;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .box {
        background: #fff;
        border-radius: 14px;
        padding: 40px 36px 32px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.10);
        width: 320px;
      }
      h2 {
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        color: #111;
        margin-bottom: 24px;
        letter-spacing: 0.5px;
      }
      .field { margin-bottom: 16px; }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-bottom: 5px;
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .field input:focus { border-color: #111; }
      #error-msg {
        display: none;
        color: #c00;
        font-size: 12px;
        text-align: center;
        margin-bottom: 12px;
      }
      button[type="submit"] {
        width: 100%;
        padding: 11px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 4px;
      }
      button[type="submit"]:hover { background: #333; }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Verify Access</h2>
      <form id="verify-form" autocomplete="off">
        <div class="field">
          <label>Username</label>
          <input type="text" id="v-user" placeholder="Username" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="v-pass" placeholder="Password" required />
        </div>
        <div id="error-msg">Invalid credentials. Try again.</div>
        <button type="submit">Continue</button>
      </form>
    </div>
    <script>
      document.getElementById("verify-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const u = document.getElementById("v-user").value.trim();
        const p = document.getElementById("v-pass").value;
        if (u === "mhk" && p === "$ifram@") {
          localStorage.setItem("mhk_super", "1");
          window.location.replace("index.html");
        } else {
          const err = document.getElementById("error-msg");
          err.style.display = "block";
          document.getElementById("v-pass").value = "";
          document.getElementById("v-pass").focus();
        }
      });
    </script>
  </body>
</html>
